name: Update README

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- git-waka: language stats from commits ---
      - uses: Castrozan/git-waka@main
        with:
          username: Castrozan
          days: "30"
          langs: "6"
          ignore: "HTML,CSS,Dockerfile,Makefile"

      # --- OSS contributions: merged + open PRs in external repos (50+ stars) ---
      - name: Fetch PRs in external repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (
            gh api graphql --paginate -f query='
              query($endCursor: String) {
                search(query: "author:Castrozan is:pr is:merged -user:Castrozan", type: ISSUE, first: 100, after: $endCursor) {
                  pageInfo { hasNextPage endCursor }
                  nodes { ... on PullRequest { title number url repository { nameWithOwner url stargazerCount } } }
                }
              }
            ' --jq '.data.search.nodes[]'
            gh api graphql --paginate -f query='
              query($endCursor: String) {
                search(query: "author:Castrozan is:pr is:open -user:Castrozan", type: ISSUE, first: 100, after: $endCursor) {
                  pageInfo { hasNextPage endCursor }
                  nodes { ... on PullRequest { title number url repository { nameWithOwner url stargazerCount } } }
                }
              }
            ' --jq '.data.search.nodes[]'
          ) | jq -s '
            [.[] | select(.repository.stargazerCount >= 50)]
            | group_by(.repository.nameWithOwner)
            | map({
                repo: .[0].repository.nameWithOwner,
                repo_url: .[0].repository.url,
                stars: .[0].repository.stargazerCount,
                prs: [.[] | {number, title, url}]
              })
            | sort_by(-.stars)
          ' > /tmp/contributions.json

      - name: Generate contributions table
        run: |
          python3 - <<'SCRIPT'
          import json

          with open("/tmp/contributions.json") as f:
              repos = json.load(f)

          lines = []
          lines.append("| Project | PR | Description |")
          lines.append("|---------|-----|-------------|")

          for repo in repos:
              for i, pr in enumerate(repo["prs"]):
                  project = f'[{repo["repo"]}]({repo["repo_url"]})' if i == 0 else ""
                  lines.append(
                      f'| {project} '
                      f'| [#{pr["number"]}]({pr["url"]}) '
                      f'| {pr["title"]} |'
                  )

          table = "\n".join(lines)

          with open("README.md") as f:
              readme = f.read()

          start = "<!-- OSS_CONTRIBUTIONS:START -->"
          end = "<!-- OSS_CONTRIBUTIONS:END -->"
          before = readme[: readme.index(start) + len(start)]
          after = readme[readme.index(end) :]

          with open("README.md", "w") as f:
              f.write(f"{before}\n{table}\n{after}")
          SCRIPT

      # --- Commit all changes ---
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "docs: update profile stats" &&
            git push
          )
